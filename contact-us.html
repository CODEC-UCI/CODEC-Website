<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEC | Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <!-- Need to fix the css files for this
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/contact.css">
    --> 
</head>
<body>

    <div class="content-wrapper contact-page-wrapper contact-split-wrapper">
        <div class="contact-header">
            <h1>Contact Us</h1>
            <p>Have questions or want to get involved? Reach out to us!</p>
        </div>

        <div class="contact-split-grid">
            <section class="split-box">
                <h3>Email</h3>
                <p>Reach out directly to the active board members for corporate matters or general questions.</p>
                <a href="mailto:codec.uci@gmail.com" class="email-badge">codec.uci@gmail.com</a>
            </section>

            <section class="split-box">
                <h3>Socials</h3>
                <p>Stay up to date with meetings and events by following us on our socials!</p>
                <ul class="social-links">
                    <li>
                        <a href="https://discord.gg/kWaEEdnzKp" target="_blank" class="social-link" aria-label="Discord">
                            <img src="images/sns/discord.png" alt="Discord logo">
                        </a>
                    </li>
                    <li>
                        <a href="https://www.instagram.com/codec.uci/" target="_blank" class="social-link" aria-label="Instagram">
                            <img src="images/sns/instagram.png" alt="Instagram logo">
                        </a>
                    </li>
                    <li>
                        <a href="https://www.linkedin.com/company/codec-uci/posts/?feedView=all" target="_blank" class="social-link" aria-label="LinkedIn">
                            <img src="images/sns/linkedin.png" alt="LinkedIn logo">
                        </a>
                    </li>
                </ul>
            </section>
        </div>
    </div>

    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>

</body>
</html>
